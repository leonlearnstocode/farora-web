<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Farora — Collect the world.</title>
  <meta name="description" content="Farora lets you collect stamps from every place you visit and build your travel passport." />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #1e2d24;
      color: #e8e0d4;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    main {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      padding: 48px 32px;
      text-align: center;
      flex: 1;
      justify-content: center;
    }

    .icon {
      width: 96px;
      height: 96px;
      margin-bottom: 32px;
    }

    h1 {
      font-size: 36px;
      font-weight: 200;
      letter-spacing: 12px;
      color: #e8e0d4;
      margin-bottom: 12px;
    }

    .tagline {
      font-size: 13px;
      letter-spacing: 3px;
      color: #8a9e8f;
      margin-bottom: 48px;
    }

    .store-btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: #f5c940;
      color: #1e2d24;
      text-decoration: none;
      padding: 14px 28px;
      border-radius: 30px;
      font-size: 15px;
      font-weight: 500;
      letter-spacing: 0.5px;
      transition: opacity 0.2s;
    }

    .store-btn:hover { opacity: 0.85; }

    .store-btn svg {
      width: 20px;
      height: 20px;
      fill: #1e2d24;
    }

    footer {
      padding: 24px 32px;
      text-align: center;
    }

    footer a {
      color: #8a9e8f;
      text-decoration: none;
      font-size: 12px;
      letter-spacing: 1px;
      margin: 0 12px;
      border-bottom: 1px solid transparent;
      transition: border-color 0.2s;
    }

    footer a:hover { border-color: #8a9e8f; }
  </style>
</head>
<body>
  <main>
    <img class="icon" src="icon.png" alt="Farora app icon" />
    <h1>FARORA</h1>
    <p class="tagline">Collect the world.</p>
    <a class="store-btn" href="https://apps.apple.com/app/farora/id000000000">
      <!-- Apple logo -->
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M17.05 20.28c-.98.95-2.05.8-3.08.35-1.09-.46-2.09-.48-3.24 0-1.44.62-2.2.44-3.06-.35C2.79 15.25 3.51 7.7 9.05 7.4c1.4.07 2.38.74 3.2.8 1.22-.24 2.39-.93 3.68-.84 1.55.12 2.72.72 3.47 1.83-3.18 1.9-2.43 5.9.65 7.07-.52 1.4-1.18 2.78-3 4.02zM12.03 7.25c-.15-2.23 1.66-4.07 3.74-4.25.29 2.58-2.34 4.5-3.74 4.25z"/>
      </svg>
      Download on the App Store
    </a>
  </main>

  <footer>
    <a href="privacy.html">Privacy Policy</a>
    <a href="terms.html">Terms of Service</a>
    <a href="mailto:hello@farora.app">Contact</a>
  </footer>
</body>
</html>
